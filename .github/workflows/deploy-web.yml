name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        env:
          GODOT_VERSION: "4.3"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget unzip
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -O /tmp/godot.zip
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Import project
        run: |
          # Godot requires two import passes: the first discovers and begins importing
          # resources, the second ensures all dependencies are fully resolved.
          godot --headless --import 2>&1 || true
          godot --headless --import 2>&1 || true

      - name: Export for Web
        run: |
          mkdir -p public
          godot --headless --export-release "Web" public/index.html

      - name: Include coi-serviceworker
        run: |
          # coi-serviceworker enables SharedArrayBuffer on GitHub Pages by setting
          # the required cross-origin isolation headers via a service worker.
          # Pinned to commit SHA for supply-chain safety (gzuidhof/coi-serviceworker).
          wget -q https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/7b1d2a092d0d2dd2b7270b6f12f13605de26f214/coi-serviceworker.min.js -O public/coi-serviceworker.min.js
          sed -i 's|<head>|<head>\n\t<script src="coi-serviceworker.min.js"></script>|' public/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
